<!DOCTYPE html>
<html>
<body>
<h2>Mom's reply will appear below:</h2>
<div id="response" style="white-space:pre-wrap;"></div>
<script>
    const eventSource = new EventSource('http://localhost:8080/api/chat?personaId=5816b9d6-f765-43ed-ad27-469b2fc4b686&content=Hey%20mom%2C%20I%20had%20a%20rough%20day');
    // Note: EventSource only supports GET, so we need to change the method.
    // Alternatively, use fetch with streaming.
    // Let's use fetch with streaming:
    async function test() {
        const response = await fetch('http://localhost:8080/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                personaId: '5816b9d6-f765-43ed-ad27-469b2fc4b686',
                content: 'Hey mom, I had a rough day'
            })
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let done = false;
        while (!done) {
            const { value, done: doneReading } = await reader.read();
            done = doneReading;
            const chunk = decoder.decode(value, { stream: true });
            document.getElementById('response').textContent += chunk;
        }
    }
    test();
</script>
</body>
</html>
