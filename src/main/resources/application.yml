server:
  port: 8080

spring:
  application:
    name: innercircle-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/innercircle}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

groq:
  api-key: ${GROQ_API_KEY:your-groq-key}
  model: llama3-70b-8192
  url: https://api.groq.com/openai/v1/chat/completions

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production}
  expiration: 86400000        # 24 hours

admin:
  key: ${ADMIN_KEY:innercircle-admin-2024}

fcm:
  server-key: ${FCM_SERVER_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://10.0.2.2:8080}

logging:
  level:
    org.springframework.security: DEBUG
    com.innercircle: DEBUG