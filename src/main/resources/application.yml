server:
  port: 8080

spring:
  application:
    name: innercircle-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/innercircle}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    # BUG FIX: Removed explicit hibernate.dialect — Hibernate 6+ auto-detects PostgreSQL
    # dialect. Specifying it explicitly triggers a deprecation WARN on every startup:
    # "HHH90000025: PostgreSQLDialect does not need to be specified explicitly"

groq:
  # BUG: this was hardcoded to the literal string "my-api-key", which silently
  # ignored any $GROQ_API_KEY you set in the shell -- every Groq call would
  # have failed with an auth error regardless of your env var. Fixed back to
  # reading from the environment.
  api-key: ${GROQ_API_KEY:your-groq-key}
  # llama-3.1-8b-instant was announced for deprecation by Groq on 2026-06-17 --
  # it may already be unstable or removed. openai/gpt-oss-120b is Groq's
  # current recommended replacement model as of this fix.
  model: openai/gpt-oss-120b
  url: https://api.groq.com/openai/v1/chat/completions

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production}
  expiration: 86400000        # 24 hours

firebase:
  # Path to a Firebase service-account JSON file. Leave unset to run without
  # real push delivery -- NotificationService will log instead of sending.
  credentials-path: ${FCM_CREDENTIALS_PATH:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://10.0.2.2:8080}

logging:
  level:
    org.springframework.security: DEBUG
    com.innercircle: DEBUG
